<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RESTOMA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">RESTOMA</div>

    <nav>
  <a href="./service.html">서비스 소개</a>
  <a href="./recommend.html">향료 추천</a>
  <a href="./custom.html">맞춤 제작</a>
  <a href="./story.html">향료 이야기</a>
  <a href="./mypage.html">마이페이지</a>
    </nav>

    <div class="auth">
      <button id="loginBtn" class="login-btn">Google로 로그인</button>

      <div id="userBox" class="user-box hidden">
        <span id="userName"></span>
        <button id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="hero">
    <section class="hero-text">
      <p class="sub">나만을 위한 향,</p>

      <h1>
        RESTOMA가<br />
        찾아드립니다.
      </h1>

      <p class="desc">
        취향 분석부터 맞춤 배합, 제작까지.<br />
        세상에 단 하나뿐인 향을 경험해보세요.
      </p>

      <div class="buttons">
        <button class="primary">나만의 향 찾기 →</button>
        <button class="secondary">서비스 소개 →</button>
      </div>
    </section>

    <section class="hero-image">
      <img src="restoma-hero.png" alt="RESTOMA 향수 이미지" />
    </section>
  </main>

  <section class="features">
    <div>
      <h3>취향 분석</h3>
      <p>간단한 설문으로 나의 취향을 분석합니다.</p>
    </div>

    <div>
      <h3>맞춤 향료 추천</h3>
      <p>AI와 전문가가 최적의 향료를 추천합니다.</p>
    </div>

    <div>
      <h3>맞춤 배합 & 제작</h3>
      <p>나만의 향을 정성스럽게 제작합니다.</p>
    </div>

    <div>
      <h3>배송 & 경험</h3>
      <p>집 앞에서 세상에 하나뿐인 향을 경험하세요.</p>
    </div>
  </section>

  <script type="module" src="auth.js"></script>
</body>
</html>
